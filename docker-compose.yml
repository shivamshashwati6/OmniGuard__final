# ══════════════════════════════════════════════════════
#  OmniGuard — Full Stack Docker Compose
#  Services: API backend + Frontend dev server
# ══════════════════════════════════════════════════════

version: "3.9"

services:
  # ── Backend API Server ──────────────────────────────
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: omniguard-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
    volumes:
      - api-logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - omniguard-net

  # ── Frontend Dev Server (Vite) ──────────────────────
  frontend:
    image: node:20-alpine
    container_name: omniguard-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/server  # Exclude server directory
    environment:
      - VITE_API_URL=http://localhost:3001
      - VITE_WS_URL=ws://localhost:3001/ws
    depends_on:
      api:
        condition: service_healthy
    networks:
      - omniguard-net

volumes:
  api-logs:
    driver: local

networks:
  omniguard-net:
    driver: bridge
