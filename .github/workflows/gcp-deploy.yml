name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'OmniGuard__backend/**'
      - 'Dockerfile.gcp'
      - '.github/workflows/gcp-deploy.yml'
  workflow_dispatch:

env:
  PROJECT_ID: robust-backend-01
  REGION: us-central1
  SERVICE_NAME: omniguard-api
  IMAGE_NAME: us-central1-docker.pkg.dev/robust-backend-01/omniguard-repo/omniguard-api

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and Push Docker Image
        run: |
          docker build -f Dockerfile.gcp -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          image: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          region: ${{ env.REGION }}
          # Cloud Run will use these env vars. 
          # Ensure these secrets are set in your GitHub repository secrets.
          env_vars: |
            NODE_ENV=production
            PORT=8080
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
            FIREBASE_CLIENT_EMAIL=${{ secrets.FIREBASE_CLIENT_EMAIL }}
            FIREBASE_PRIVATE_KEY=${{ secrets.FIREBASE_PRIVATE_KEY }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          flags: '--allow-unauthenticated'

      - name: Show Output URL
        run: echo "Deployment complete! Your API is live at ${{ steps.deploy.outputs.url }}"
